spring:
  application:
    name: simple-board

  datasource:
    url: jdbc:h2:mem:testdb # in-memory mode
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  jpa:
    show-sql: true # 실행되는 sql을 콘솔에 출력
    properties:
      hibernate:
        format_sql: true # sql을 읽기 좋게 정렬
    hibernate:
      ddl-auto: create # 프로젝트 실행 시 테이블을 자동으로 생성 (개발용)