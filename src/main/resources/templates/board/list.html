<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>게시판 목록</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
      padding: 32px 16px;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.06);
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    h1 { margin: 0; font-size: 24px; }
    .btn {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 8px;
      text-decoration: none;
      border: 1px solid transparent;
      font-weight: 600;
    }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
    }
    th, td {
      padding: 12px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      vertical-align: middle;
    }
    th {
      background: #f9fafb;
      font-size: 14px;
      color: #374151;
    }
    tbody tr:hover { background: #f8fbff; }
    tbody tr:last-child td { border-bottom: none; }
    .title-link {
      color: #1d4ed8;
      text-decoration: none;
      font-weight: 600;
    }
    .title-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>게시판 목록</h1>
    <a th:href="@{/board/write}" class="btn btn-primary">글쓰기</a>
  </div>
  <table>
    <thead>
    <tr>
      <th>번호</th>
      <th>제목</th>
      <th>작성자</th>
      <th>작성일</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="board : ${boards}">
      <td th:text="${board.id}">1</td>
      <td>
        <a class="title-link" th:href="@{/board/view/{id}(id=${board.id})}" th:text="${board.title}">제목</a>
      </td>
      <td th:text="${board.writer}">작성자</td>
      <td th:text="${#temporals.format(board.createdDate, 'yyyy-MM-dd HH:mm')}">2026-04-20</td>
    </tr>
    </tbody>
  </table>
</div>
</body>
</html>
