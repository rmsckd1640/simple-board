<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"> <head>
  <meta charset="UTF-8">
  <title>게시판 목록</title>
  <style>
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .write-btn { padding: 8px 14px; background-color: #28a745; color: #fff; text-decoration: none; border-radius: 4px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background-color: #f2f2f2; }
  </style>
</head>
<body>
<div class="header">
  <h1>게시판 목록</h1>
  <a th:href="@{/board/write}" class="write-btn">글쓰기</a>
</div>
<table>
  <thead>
  <tr>
    <th>번호</th>
    <th>제목</th>
    <th>작성자</th>
    <th>작성일</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="board : ${boards}">
    <td th:text="${board.id}">1</td>
    <td>
      <a th:href="@{/board/view/{id}(id=${board.id})}" th:text="${board.title}">제목</a>
    </td>
    <td th:text="${board.writer}">작성자</td>
    <td th:text="${#temporals.format(board.createdDate, 'yyyy-MM-dd HH:mm')}">2026-04-20</td>
  </tr>
  </tbody>
</table>
</body>
</html>
