<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>글 수정</title></head>
<body>
<h1>✏️ 글 수정</h1>
<form th:action="@{/board/edit/{id}(id=${board.id})}" method="post">
    <input type="text" name="title" th:value="${board.title}" required><br>
    <input type="text" name="writer" th:value="${board.writer}" required><br>
    <textarea name="content" th:text="${board.content}" required></textarea><br>
    <button type="submit">수정 완료</button>
    <a th:href="@{/board/view/{id}(id=${board.id})}">취소</a>
</form>
</body>
</html>
