<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>게시글 상세 보기</title>
  <style>
    body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
    .container { max-width: 800px; margin: 0 auto; border: 1px solid #ddd; padding: 20px; border-radius: 8px; }
    .header { border-bottom: 2px solid #f4f4f4; padding-bottom: 10px; margin-bottom: 20px; }
    .content { min-height: 200px; background: #fafafa; padding: 15px; border-radius: 4px; white-space: pre-wrap; }
    .footer { margin-top: 20px; display: flex; gap: 8px; }
    .btn { padding: 10px 15px; text-decoration: none; background: #007bff; color: white; border-radius: 4px; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1 th:text="${board.title}">제목입니다</h1>
    <p>
      작성자: <span th:text="${board.writer}">홍길동</span> |
      작성일: <span th:text="${#temporals.format(board.createdDate, 'yyyy-MM-dd HH:mm')}">2026-04-20</span>
    </p>
  </div>

  <div class="content" th:text="${board.content}">
    내용이 들어가는 자리입니다.
  </div>

  <div class="footer">
    <a th:href="@{/board/edit/{id}(id=${board.id})}" class="btn">수정하기</a>
    <a th:href="@{/board/list}" class="btn">목록으로 돌아가기</a>
  </div>
</div>
</body>
</html>
