<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>게시글 상세 보기</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
      padding: 32px 16px;
      line-height: 1.6;
    }
    .container {
      max-width: 860px;
      margin: 0 auto;
      border: 1px solid #e5e7eb;
      background: #fff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.06);
    }
    .header {
      border-bottom: 1px solid #e5e7eb;
      padding-bottom: 14px;
      margin-bottom: 18px;
    }
    h1 { margin: 0 0 8px; font-size: 26px; }
    .meta { margin: 0; color: #6b7280; font-size: 14px; }
    .content {
      min-height: 220px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      padding: 16px;
      border-radius: 10px;
      white-space: pre-wrap;
    }
    .footer {
      margin-top: 20px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 8px;
      text-decoration: none;
      border: 1px solid transparent;
      font-weight: 600;
    }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-secondary { background: #fff; color: #374151; border-color: #d1d5db; }
    .btn-secondary:hover { background: #f9fafb; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1 th:text="${board.title}">제목입니다</h1>
    <p class="meta">
      작성자: <span th:text="${board.writer}">홍길동</span> |
      작성일: <span th:text="${#temporals.format(board.createdDate, 'yyyy-MM-dd HH:mm')}">2026-04-20</span>
    </p>
  </div>

  <div class="content" th:text="${board.content}">
    내용이 들어가는 자리입니다.
  </div>

  <div class="footer">
    <a th:href="@{/board/edit/{id}(id=${board.id})}" class="btn btn-primary">수정하기</a>
    <a th:href="@{/board/list}" class="btn btn-secondary">목록으로 돌아가기</a>
  </div>
</div>
</body>
</html>
