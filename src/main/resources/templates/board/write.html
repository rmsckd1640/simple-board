<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>글쓰기</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input[type="text"], input[type="password"], textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        textarea { height: 200px; }
        .btn-group { margin-top: 20px; }
        .btn { padding: 10px 20px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>
<h1>✍️ 새 글 작성</h1>
<form action="/board/write" method="post">
    <div class="form-group">
        <label>제목</label>
        <input type="text" name="title" required>
    </div>
    <div class="form-group">
        <label>작성자</label>
        <input type="text" name="writer" required>
    </div>
    <div class="form-group">
        <label>비밀번호</label>
        <input type="password" name="password" required>
    </div>
    <div class="form-group">
        <label>내용</label>
        <textarea name="content" required></textarea>
    </div>
    <div class="btn-group">
        <button type="submit" class="btn">저장하기</button>
        <a th:href="@{/board/list}">취소</a>
    </div>
</form>
</body>
</html>
